apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: liquid-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      containers:
      - name: paperclip
        image: paperclip:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: paperclip
  namespace: liquid-lab
spec:
  selector:
    app: paperclip
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    name: http
  type: ClusterIP
