---
# Hermes Agent Service
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: liquid-lab
  labels:
    app: hermes-agent
spec:
  selector:
    app: hermes-agent
  ports:
  - port: 3001
    targetPort: 3001
    name: http
  type: ClusterIP

---
# Hermes Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: liquid-lab
  labels:
    app: hermes-agent
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      serviceAccountName: hermes-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: agent
        image: liquid-lab-hermes-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          value: "postgresql://liquid:liquidlab-secure-password-change-in-prod@postgres.data-layer.svc.cluster.local:5432/liquid_lab"
        - name: REDIS_URL
          value: "redis://redis.data-layer.svc.cluster.local:6379"
        - name: CLAUDE_API_URL
          value: "http://claude-api:3000"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: claude-credentials
              key: api-key
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /var/log
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      terminationGracePeriodSeconds: 30
